name: Production Promote

on:
  workflow_dispatch:
    inputs:
      main_sha:
        description: Main commit SHA to promote to production.
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: sketch-rts-production-promote
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Promote exact main commit to production
        env:
          MAIN_SHA: ${{ inputs.main_sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main production
          main_tip="$(git rev-parse origin/main)"
          if [[ "$MAIN_SHA" != "$main_tip" ]]; then
            echo "::error::main_sha must equal current origin/main ($main_tip)."
            exit 1
          fi
          git push origin "$MAIN_SHA:refs/heads/production"
